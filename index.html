<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SpecArc - AI Product Architecture Studio</title>
    <link rel="icon" type="image/svg+xml" href="/specarc-mark.svg" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              slate: {
                850: '#1e293b',
                950: '#020617',
              }
            },
            animation: {
              'shine': 'shine 1s',
            }
          }
        }
      }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'Manrope', sans-serif;
        background-color: #f5f4ef;
        background-image:
          radial-gradient(circle at top left, rgba(99, 102, 241, 0.10), transparent 24%),
          radial-gradient(circle at bottom right, rgba(20, 184, 166, 0.08), transparent 22%),
          linear-gradient(rgba(15, 23, 42, 0.035) 1px, transparent 1px),
          linear-gradient(90deg, rgba(15, 23, 42, 0.035) 1px, transparent 1px);
        background-size: auto, auto, 28px 28px, 28px 28px;
        background-attachment: fixed;
        min-height: 100vh;
        color: #0f172a;
        transition: background-color 0.5s ease, color 0.5s ease;
      }

      body.dark {
        background-color: #0b1120;
        background-image:
          radial-gradient(circle at top left, rgba(99, 102, 241, 0.16), transparent 24%),
          radial-gradient(circle at bottom right, rgba(45, 212, 191, 0.10), transparent 20%),
          linear-gradient(rgba(148, 163, 184, 0.05) 1px, transparent 1px),
          linear-gradient(90deg, rgba(148, 163, 184, 0.05) 1px, transparent 1px);
        background-size: auto, auto, 28px 28px, 28px 28px;
        color: #f8fafc;
      }
      
      /* Custom scrollbar */
      ::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }
      ::-webkit-scrollbar-track {
        background: transparent; 
      }
      ::-webkit-scrollbar-thumb {
        background: rgba(148, 163, 184, 0.5); 
        border-radius: 10px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: rgba(148, 163, 184, 0.8); 
      }

      .fade-in {
        animation: fadeIn 0.5s cubic-bezier(0.2, 0.8, 0.2, 1);
      }
      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(8px); }
        to { opacity: 1; transform: translateY(0); }
      }
      
      .glass {
        background: rgba(255, 255, 255, 0.78);
        backdrop-filter: blur(14px);
        -webkit-backdrop-filter: blur(14px);
        border: 1px solid rgba(226, 232, 240, 0.92);
        box-shadow: 0 18px 45px -30px rgba(15, 23, 42, 0.25);
      }
      .glass-panel {
        background: rgba(255, 255, 255, 0.9);
        backdrop-filter: blur(18px);
        -webkit-backdrop-filter: blur(18px);
        border: 1px solid rgba(226, 232, 240, 0.9);
        box-shadow:
          0 22px 60px -34px rgba(15, 23, 42, 0.25),
          0 1px 0 rgba(255,255,255,0.55) inset;
      }

      body.dark .glass {
        background: rgba(15, 23, 42, 0.78);
        border: 1px solid rgba(148, 163, 184, 0.14);
        box-shadow: 0 18px 45px -28px rgba(0, 0, 0, 0.45);
      }
      body.dark .glass-panel {
        background: rgba(15, 23, 42, 0.84);
        border: 1px solid rgba(148, 163, 184, 0.16);
        box-shadow:
          0 24px 60px -34px rgba(0,0,0,0.55),
          0 1px 0 rgba(255,255,255,0.05) inset;
      }

      .glass-dark {
        background: rgba(17, 24, 39, 0.92);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border: 1px solid rgba(148, 163, 184, 0.14);
        box-shadow: 0 24px 60px -34px rgba(0, 0, 0, 0.45);
        color: white;
      }

      .premium-input {
        background: rgba(255, 255, 255, 0.86);
        border: 1px solid rgba(226, 232, 240, 0.92);
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      }
      .premium-input:focus {
        background: white;
        border-color: #6366f1;
        box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
        outline: none;
      }

      @media (prefers-reduced-motion: reduce) {
        .animate-pulse,
        .animate-bounce {
          animation: none !important;
        }
      }

      @keyframes shine {
        0% { left: -100%; }
        100% { left: 125%; }
      }
      
      .loader {
        border: 3px solid rgba(148,163,184,0.16);
        border-radius: 50%;
        border-top: 3px solid #6366f1;
        width: 24px;
        height: 24px;
        animation: spin 1s linear infinite;
      }
      body.dark .loader {
        border-color: rgba(255,255,255,0.08);
        border-top-color: #818cf8;
      }
      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
      .mono-ui {
        font-family: 'IBM Plex Mono', monospace;
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react/": "https://aistudiocdn.com/react@^19.2.0/",
    "react": "https://aistudiocdn.com/react@^19.2.0",
    "lucide-react": "https://aistudiocdn.com/lucide-react@^0.555.0",
    "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.0/",
    "@google/genai": "https://aistudiocdn.com/@google/genai@^1.31.0"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
  <body class="antialiased selection:bg-indigo-500 selection:text-white">
    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
